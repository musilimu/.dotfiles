for_window [class="^.*"] border pixel 3
default_border pixel 3
default_floating_border normal 0
hide_edge_borders smart
gaps inner 8
gaps outer 8

exec_always --no-startup-id feh --bg-scale --randomize ~/Pictures
# Picom
exec_always --no-startup-id picom --config ~/.config/picom.conf

# touchpad
exec --no-startup-id xinput set-prop "ELAN06FA:00 04F3:3248 Touchpad" "Synaptics Tap Action" 1, 3, 2, 0, 0, 0, 0

assign [class="kitty"] 3
assign [class="(?i)code"] 1
assign [class="chrome"] 2
assign [class="vlc"] 6
assign [class="nautilus"] 6
